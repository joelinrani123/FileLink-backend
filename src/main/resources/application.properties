spring.application.name=filelink

# ---- MySQL ----
spring.datasource.url=jdbc:mysql://localhost:3306/filelink_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ---- File upload ----
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=1024MB
spring.servlet.multipart.max-request-size=1024MB

# Directory where uploaded files are physically stored on disk
filelink.upload-dir=./uploads

# ---- JWT ----
# Change this secret before deploying to production. Must be at least 32 chars for HS256.
filelink.jwt.secret=ChangeThisSuperSecretKeyForFileLinkApp1234567890
filelink.jwt.expiration-ms=604800000

# ---- Server ----
server.port=8080

server.tomcat.max-http-form-post-size=1073741824
server.tomcat.max-swallow-size=-1